<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Gallery</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f1a;
        color: #e0e0ff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
      }
      h1 { font-size: 2.5rem; letter-spacing: 0.05em; }
      .gallery {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      a.card {
        display: block;
        padding: 1.5rem 2.5rem;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        color: inherit;
        text-decoration: none;
        font-size: 1.1rem;
        transition: background 0.2s, transform 0.2s;
      }
      a.card:hover {
        background: rgba(255,255,255,0.14);
        transform: translateY(-3px);
      }
    </style>
  </head>
  <body>
    <h1>Animation Gallery</h1>
    <div class="gallery">
      <a class="card" href="pages/ripple.html">Ripple</a>
      <a class="card" href="pages/particles.html">Particles</a>
    </div>
  </body>
</html>
